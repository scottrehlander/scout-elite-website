
permalink: /blog/:year/:month/:day/:title/
title: Scout Elite - Video Analysis Solutions for Youth and Minor Hockey
url: https://scout-elite.com
baseurl: ''

collections:
  pages:
    output: true
  landing-pages:
    output: true
    permalink: /:path/
  help:
    output: true
    permalink: /help/:path/

plugins:
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-redirect-from

defaults:
  - scope:
      path: "img"
    values:
      sitemap: false
  - scope:
      path: "scripts"
    values:
      sitemap: false
  - scope:
      path: "styles"
    values:
      sitemap: false

whitelist:
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-redirect-from
